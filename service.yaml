apiVersion: v1
kind: Service
metadata:
  name: flask-app-service-nodeport
spec:
  type: NodePort
  selector:
    app: flask-app # Must match Deployment labels
  ports:
    - protocol: TCP
      port: 5000      # Internal Service Port
      targetPort: 5000 # Port inside the container
      nodePort: 30008 # Port accessible on your EC2

