apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app # name of the deployment

spec:
  template: # pod defintion
    metadata:
      name: flask-app # name of the pod
      labels:
        app: flask-app
        tier: frontend
    spec:
      containers:
        - name: flask-app
          image: saurabhk91/flask-app
  replicas: 3
  selector: # Mandatory, Select the pods which needs to be in the replicaset
    matchLabels:
      app: flask-hello
      tier: frontend
