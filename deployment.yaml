apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment  # Targeted by Jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app-container # Targeted by Jenkins 'set image'
        image: saurabhk91/flask-app:latest # Initial placeholder
        ports:
        - containerPort: 5000
        imagePullPolicy: Always
        
